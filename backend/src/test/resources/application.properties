spring.datasource.url=jdbc:h2:mem:lostfound;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.sql.init.mode=never

app.auth.jwt.secret=01234567890123456789012345678901
app.auth.jwt.expiration-ms=21600000

spring.mail.host=localhost
app.notification.from-email=test@lostfound.edu