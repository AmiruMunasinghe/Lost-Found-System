spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Mail Configurations for test
spring.mail.host=localhost
spring.mail.port=25

# JWT Configurations for test
app.auth.jwt.secret=mysecretjwtkeyforlostfoundmanagementapplicationsystem1234567890
app.auth.jwt.expiration-ms=86400000

# Matching Engine Configuration
app.matching.threshold.auto-accept=0.70
app.matching.threshold.manual-review=0.45
app.matching.weights.text=0.50
app.matching.weights.category=0.30
app.matching.weights.location=0.20

# Notification Configurations for test
app.notification.from-email=notifications@lostfound.edu
spring.application.name=lostfound

