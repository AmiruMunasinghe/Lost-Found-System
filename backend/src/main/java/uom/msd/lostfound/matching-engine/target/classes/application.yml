spring:
  application:
    name: lostfound-matching-engine

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/lostfound}
    username: ${DB_USER:lostfound}
    password: ${DB_PASS:secret}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate        # use Flyway for schema management
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
    listener:
      simple:
        acknowledge-mode: auto

# ── Matching Engine Tuning ────────────────────────────────────────────────────
matching:
  threshold:
    auto-approve: 75        # scores >= 75 → immediate notification
    manual-review-low: 45   # scores 45–74 → admin queue; below 45 → discarded
  max-candidates: 10        # max ranked results returned per query

# ── RabbitMQ Exchange ─────────────────────────────────────────────────────────
rabbitmq:
  exchange:
    lostfound: lostfound.events

# ── Springdoc OpenAPI ─────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.uom.lostfound.matching: DEBUG
    org.springframework.amqp: WARN
