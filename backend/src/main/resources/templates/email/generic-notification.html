<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 30px auto; background: #ffffff; border-radius: 8px; padding: 30px; }
        .header { background-color: #1a73e8; color: white; padding: 16px 24px; border-radius: 6px 6px 0 0; }
        .body { padding: 24px; }
        .footer { text-align: center; font-size: 12px; color: #888; margin-top: 24px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2 style="margin:0;" th:text="${title}">Notification</h2>
    </div>
    <div class="body">
        <p th:text="${message}">Message content here.</p>
    </div>
    <div class="footer">
        <p>University Lost &amp; Found Management System &copy; 2026</p>
        <p>This is an automated notification. Please do not reply to this email.</p>
    </div>
</div>
</body>
</html>
