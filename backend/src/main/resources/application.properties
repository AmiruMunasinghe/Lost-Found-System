spring.application.name=lostfound
server.port=8085

spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${DB_URL:jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDER=HIGH;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ── Mail (set MAIL_HOST / MAIL_USERNAME / MAIL_PASSWORD in .env) ──────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Notifications ─────────────────────────────────────────────────────────────
app.notification.from-email=${NOTIFICATION_FROM_EMAIL:notifications@lostfound.edu}

# ── Matching Engine Configuration ──────────────────────────────────────────────
app.matching.threshold.auto-accept=0.70
app.matching.threshold.manual-review=0.45
app.matching.weights.text=0.50
app.matching.weights.category=0.30
app.matching.weights.location=0.20

# ── JWT Security Configuration ──────────────────────────────────────────────────
app.auth.jwt.secret=${TOKEN_SECRET_KEY:mysecretjwtkeyforlostfoundmanagementapplicationsystem1234567890}
app.auth.jwt.expiration-ms=${TOKEN_EXPIRATION_MS:86400000}

