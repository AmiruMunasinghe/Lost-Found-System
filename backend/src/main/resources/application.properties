spring.application.name=lostfound

spring.config.import=optional:file:.env[.properties]

default.db.url=jdbc:h2:mem:lostfound;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
default.db.driver=org.h2.Driver
default.db.user=sa
default.db.password=
default.jwt.secret=replace-with-a-long-random-secret-key-at-least-256-bits-which-is-super-long-long-and-secure

spring.datasource.url=${DB_URL:${default.db.url}}
spring.datasource.driver-class-name=${DB_DRIVER:${default.db.driver}}
spring.datasource.username=${DB_USER:${default.db.user}}
spring.datasource.password=${DB_PASSWORD:${default.db.password}}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port=8085

app.auth.jwt.secret=${TOKEN_SECRET_KEY:${default.jwt.secret}}
app.auth.jwt.expiration-ms=${TOKEN_EXPIRATION_MS:21600000}

# ── Mail (set MAIL_HOST / MAIL_USERNAME / MAIL_PASSWORD in .env) ──────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Notifications ─────────────────────────────────────────────────────────────
app.notification.from-email=${NOTIFICATION_FROM_EMAIL:notifications@lostfound.edu}

# ── Rewards ───────────────────────────────────────────────────────────────────
app.rewards.points-per-found-item=${REWARDS_POINTS_PER_FOUND_ITEM:50}
app.rewards.points-per-claimed-item=${REWARDS_POINTS_PER_CLAIMED_ITEM:20}
